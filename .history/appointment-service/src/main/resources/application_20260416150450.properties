server:
  port: 8084 # ⚠️ Changed from 8083 (See note below!)

spring:
  application:
    name: appointmentservice
  
  datasource:
    url: jdbc:postgresql://localhost:5432/appointment_service_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:rootpassword123}
    
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect