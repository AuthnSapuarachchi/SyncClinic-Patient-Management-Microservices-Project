server:
  port: 8083

spring:
  application:
    name: doctorservice

  datasource:
    url: jdbc:postgresql://localhost:5432/doctor_service_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
