version: '3.8'

services:
  # ==========================================
  # 1. DATABASES & BROKERS
  # ==========================================
  postgres-db:
    image: postgres:15-alpine
    container_name: syncclinic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword123
      # This creates the first DB automatically
      POSTGRES_DB: syncclinic_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Create an init.sql file next to this docker-compose.yml to create the other DBs!
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d syncclinic_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: syncclinic-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - healthcare-network

  mongodb:
    image: mongo:7.0
    container_name: syncclinic-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - healthcare-network

  kafka:
    image: confluentinc/confluent-local:7.6.0
    container_name: syncclinic_broker
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # FIXED FOR DOCKER: Use the container name so other services can find it
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    networks:
      - healthcare-network

  # ==========================================
  # 2. MICROSERVICES
  # ==========================================
  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: syncclinic-gateway
    ports:
      - "8080:8080"
    networks:
      - healthcare-network

  patient-service:
    build: 
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: syncclinic-patient
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5433/patient_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword123
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - healthcare-network

  doctor-service:
    build: 
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: syncclinic-doctor
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5433/doctor_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword123
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - healthcare-network

  appointment-service:
    build: 
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: syncclinic-appointment
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5433/appointment_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword123
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - healthcare-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: syncclinic-payment
    ports:
      - "8084:8084"
    environment:
      # Pointed to the unified postgres-db container!
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5433/syncclinic_payment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    depends_on:
      postgres-db:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - healthcare-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: syncclinic-notification
    ports:
      - "8085:8085"
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://admin:admin123@mongodb:27017/notification_db?authSource=admin}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-your-account-sid}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-your-auth-token}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-+1234567890}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare-network

  telemedicine-service:
    build:
      context: ./telemedicine-service
      dockerfile: Dockerfile
    container_name: syncclinic-telemedicine
    # Moved back to 8087 to avoid clashing with Appointment Service!
    ports:
      - "8087:8087"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:admin123@mongodb:27017/telemedicine_db?authSource=admin}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JITSI_BASE_URL: https://meet.jit.si
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare-network

  ai-symptoms-service:
    build:
      context: ./ai-symptoms-service
      dockerfile: Dockerfile
    container_name: syncclinic-ai-symptoms
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5433/ai_symptoms_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: rootpassword123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_ENABLED: "false"
      JWT_SECRET: your_very_secure_and_long_secret_key_for_medisphere_telemedicine_service_2026
      GROQ_API_URL: https://api.groq.com/openai/v1/chat/completions
      GROQ_API_KEY: ${GROQ_API_KEY:-test-key}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare-network

volumes:
  postgres-data:
  rabbitmq-data:
  mongodb-data:

networks:
  healthcare-network:
    driver: bridge