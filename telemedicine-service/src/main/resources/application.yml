server:
  port: 8087
  servlet:
    context-path: /telemedicine-service

spring:
  application:
    name: telemedicine-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/telemedicine_db}
      auto-index-creation: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    connection-timeout: 10000ms

jitsi:
  domain: meet.jit.si
  base-url: https://meet.jit.si

logging:
  level:
    root: INFO
    com.healthcare.telemedicine: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"