server.port=8083
server.servlet.context-path=/telemedicine-service

# Application Name
spring.application.name=telemedicine-service

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/telemedicine_db}
spring.data.mongodb.auto-index-creation=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=10000ms

# Jitsi Configuration
jitsi.domain=meet.jit.si
jitsi.base-url=https://meet.jit.si

# Logging
logging.level.root=INFO
logging.level.com.healthcare.telemedicine=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
