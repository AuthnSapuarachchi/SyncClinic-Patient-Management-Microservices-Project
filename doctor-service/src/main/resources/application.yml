server:
  port: 8083

spring:
  application:
    name: doctorservice

  datasource:
    url: jdbc:postgresql://localhost:5433/doctor_service_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:rootpassword123}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
