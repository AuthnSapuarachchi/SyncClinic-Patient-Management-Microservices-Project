server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
          # Route for the Identity Service
        - id: identity-service
          uri: http://localhost:8081  # Pointing to your identity service
          predicates:
            - Path=/auth/**
          filters:
            - AuthenticationFilter

        # Route for the Patient Management Service
        - id: patient-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/patient/**
          filters:
            - AuthenticationFilter

        # Route for the Doctor Management Service
        - id: doctor-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/doctor/**

        # Route for the Appointment Service
        - id: appointment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/appointment/**
