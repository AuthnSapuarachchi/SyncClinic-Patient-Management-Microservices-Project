server.port=8084

spring.application.name=payment-service

# PostgreSQL
# Use postgres-payment-db when running in Docker, localhost:5435 for local dev
spring.datasource.url=jdbc:postgresql://localhost:5435/syncclinic_payment
spring.datasource.username=postgres
spring.datasource.password=rootpassword123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Eureka (disabled for now — enable when service-registry is running)
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.instance.prefer-ip-address=true

# Stripe Keys (sandbox)
stripe.api.key=${STRIPE_API_KEY:sk_test_51TMRVCRx3TiIWi21ORiqn4uExXI1WfMowDiuOBnNSWkoymXFSJP6m9kCHATnA70b3wand56OSQdqUDIQ7Efb1g9i00kO3v2T8x}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_51TMRVCRx3TiIWi21sogS8kzWtI2BKfk1x1uTgsnV526Ud5Y5JPLvdvkV24O1g5BmVrjIfUELgdZefrn9pgEUqVTW001VxdRF2Q}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_331095c6936e568759b2a0556aa2e04d721e4adef4e38de827c9b4a7ebe259a3}

# Internal service URLs (for appointment status verification)
# When running locally use localhost ports, in Docker use service names
appointment.service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8082}
telemedicine.service.url=${TELEMEDICINE_SERVICE_URL:http://localhost:8083}

# Kafka Topics
kafka.topic.payment-success=payment-success-events
kafka.topic.payment-failed=payment-failed-events

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.SyncClinic.payment_service=DEBUG