version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: syncclinic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword123
      POSTGRES_DB: syncclinic_auth
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: