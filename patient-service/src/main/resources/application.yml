server:
  port: 8082

spring:
  application:
    name: patient-service
  datasource:
    # Notice it points to the NEW database!
    url: jdbc:postgresql://localhost:5433/syncclinic_patients
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:rootpassword123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create # Automatically creates the tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: patient-group  # This is the "bookmark" Kafka uses to track this specific service
      auto-offset-reset: earliest # If the service boots up for the first time, read from the beginning of the queue!
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}