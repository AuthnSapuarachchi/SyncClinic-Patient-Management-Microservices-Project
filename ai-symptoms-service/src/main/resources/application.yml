server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: medisphere-AIsymptomcheck-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ai_symptoms_db}
    driverClassName: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword123}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}

openai:
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}

logging:
  level:
    com:
      SyncClinic: DEBUG