spring.application.name=medisphere-AIsymptomcheck-service
server.port=${SERVER_PORT:8088}

# Data Source configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ai_symptoms_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# Actuator for monitoring
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}

# GROQ API
groq.api-url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api-key=${GROQ_API_KEY:}

# JWT (same secret as all other services)
jwt.secret=${JWT_SECRET:your_very_secure_and_long_secret_key_for_medisphere_telemedicine_service_2026}

# Disable open-in-view
spring.jpa.open-in-view=false

# Logging
logging.level.com.medisphere=DEBUG