server.port=8085
server.servlet.context-path=/notification-service

# Application Name
spring.application.name=notification-service

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/notification_db}
spring.data.mongodb.auto-index-creation=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=10000ms

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Twilio Configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID:your-account-sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your-auth-token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+1234567890}

# Logging
logging.level.root=INFO
logging.level.com.healthcare.notification=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
