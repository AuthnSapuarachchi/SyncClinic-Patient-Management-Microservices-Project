server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    # Standard PostgreSQL port is 5432
    url: jdbc:postgresql://localhost:5432/syncclinic_auth
    username: postgres # 'postgres' is usually the default admin username, not 'root'
    password: password # Change this to your actual pgAdmin/postgres password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect